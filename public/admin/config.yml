backend:
  name: github
  repo: kupka05/kupka05.github.io # IMPORTANT: Replace this with your actual GitHub username and repository name
  branch: main # Branch to update (optional; defaults to master)
  use_pkce: true # Enable PKCE for GitHub Pages without an external OAuth server
  app_id: Ov23liCUq6g7nyoP6GaP # IMPORTANT: Replace with the Client ID of your GitHub OAuth App

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "portfolio"
    label: "Portfolio Data"
    files:
      - file: "src/data/portfolio.json"
        label: "Portfolio Settings"
        name: "settings"
        fields:
          - {label: "Header", name: "header", widget: "object", fields: [
              {label: "Name", name: "name", widget: "string"},
              {label: "Job Title", name: "jobTitle", widget: "string"}
            ]}
          - {label: "Hero", name: "hero", widget: "object", fields: [
              {label: "Greeting", name: "greeting", widget: "string"},
              {label: "Description", name: "description", widget: "markdown"}
            ]}
          - {label: "About", name: "about", widget: "object", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Content", name: "content", widget: "markdown"}
            ]}
          - {label: "Skills", name: "skills", widget: "list", fields: [
              {label: "Name", name: "name", widget: "string"},
              {label: "Level", name: "level", widget: "select", options: ["상", "중", "하"]},
              {label: "Category", name: "category", widget: "select", options: ["Engine", "Scripting", "Tools", "Other"]}
            ]}
          - {label: "Projects", name: "projects", widget: "list", fields: [
              {label: "ID", name: "id", widget: "string"},
              {label: "Title", name: "title", widget: "string"},
              {label: "Genre", name: "genre", widget: "string"},
              {label: "Role", name: "role", widget: "string"},
              {label: "Period", name: "period", widget: "string"},
              {label: "Description", name: "description", widget: "markdown"},
              {label: "Image URL", name: "imageUrl", widget: "image"},
              {label: "Links", name: "links", widget: "object", required: false, fields: [
                {label: "Play Link", name: "play", widget: "string", required: false},
                {label: "Video Link", name: "video", widget: "string", required: false},
                {label: "GitHub Link", name: "github", widget: "string", required: false}
              ]}
            ]}
          - {label: "Contact", name: "contact", widget: "object", fields: [
              {label: "Email", name: "email", widget: "string"},
              {label: "Phone", name: "phone", widget: "string"},
              {label: "GitHub", name: "github", widget: "string"},
              {label: "LinkedIn", name: "linkedin", widget: "string"}
            ]}
